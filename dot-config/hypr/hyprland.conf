# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,1
# monitor=DP-1,preferred,auto,2

# Config for the video projector
# Scale needs to be set as 1 (Unscaled) which was not the default
#monitor=HDMI-A-2,800x600@60.31700,0x0,1

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
# exec-once = waybar & hyprpaper & firefox

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Some default env vars.
env = HYPRCURSOR_THEME,"Future-Cyan-Hyprcursor_Theme"
env = HYPRCURSOR_SIZE,24
env = XCURSOR_SIZE,24

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = fr
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 0

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 5
    gaps_out = 15
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 10
    
    blur {
        enabled = true
        size = 3
        passes = 1
    }

    #drop_shadow = yes
    #shadow_range = 4
    #shadow_render_power = 3
    #col.shadow = rgba(1a1a1aee)
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    # new_is_master = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = off
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 0 # Set to 0 to disable the anime mascot wallpapers
    enable_swallow = true
    swallow_regex = ^(foot)$
    disable_hyprland_logo = true
}


# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# windowrule=workspace 9,keepassxc


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
 # $mainMod = ALT
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more

bind = $mainMod + SHIFT, C, killactive, 
bind = $mainMod + SHIFT, Q, exit, 

bind = $mainMod, F, fullscreen, 
bind = $mainMod, V, togglefloating, 

# Master layout keybinds 
bind = $mainMod, Return, layoutmsg, swapwithmaster master

bind = $mainMod + SHIFT, Return, exec, foot
bind = $mainMod, A, exec, librewolf
bind = $mainMod + SHIFT, A, exec, firefox

bind = $mainMod , Z, exec, keepassxc
bind = $mainMod + SHIFT, L, exec, hyprlock

bind = $mainMod, P, exec, fuzzel
bind = $mainMod + SHIFT, P, exec, app_launcher

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d


# Workspaces
bind = $mainMod, ampersand, workspace, 1
bind = $mainMod, eacute, workspace, 2
bind = $mainMod, quotedbl, workspace, 3
bind = $mainMod, apostrophe, workspace, 4
bind = $mainMod, parenleft, workspace, 5
bind = $mainMod, egrave, workspace, 6
bind = $mainMod, minus, workspace, 7
bind = $mainMod, underscore, workspace, 8
bind = $mainMod, ccedilla, workspace, 9
bind = $mainMod, agrave, workspace, 10


# Send to Workspaces
bind = $mainMod + SHIFT, ampersand, movetoworkspace, 1
bind = $mainMod + SHIFT, eacute, movetoworkspace, 2
bind = $mainMod + SHIFT, quotedbl, movetoworkspace, 3
bind = $mainMod + SHIFT, apostrophe, movetoworkspace, 4
bind = $mainMod + SHIFT, parenleft, movetoworkspace, 5
bind = $mainMod + SHIFT, egrave, movetoworkspace, 6
bind = $mainMod + SHIFT, minus, movetoworkspace, 7
bind = $mainMod + SHIFT, underscore, movetoworkspace, 8
bind = $mainMod + SHIFT, ccedilla, movetoworkspace, 9
bind = $mainMod + SHIFT, agrave, movetoworkspace, 10
   
# Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, exec, screenshot_output
  
# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bind = $mainMod, TAB, workspace, back_and_forth
# bind = $mainMod, Tab, exec, hyprcrl dispatch workspace back_and_forth
# bind = $mainMod, Tab, workspace, e+1
# bind = $mainMod + SHIFT, Tab, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Toggle waybar visibility
bind = $mainMod, B, exec, pkill -USR1 waybar

#source=~/.config/hypr/extra.conf

exec-once = [workspace 9 silent] keepassxc
exec-once = hyprpaper
exec-once = waybar
exec-once = foot --server
exec-once = dunst
exec-once = blueman-applet
exec-once = kdeconnectd
